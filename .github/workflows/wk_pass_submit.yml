name: WaniKani Auto-Submit Pending Reviews

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Submit pending reviews
        env:
          WK_API_KEY:      ${{ secrets.WK_API_KEY }}
          WK_GIST_TOKEN:   ${{ secrets.WK_GIST_TOKEN }}
          WK_PASS_GIST_ID: ${{ secrets.WK_PASS_GIST_ID }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os, sys
          from datetime import datetime, timezone

          WK_KEY    = os.environ.get('WK_API_KEY', '').strip()
          GH_TOKEN  = os.environ.get('WK_GIST_TOKEN', '').strip()
          GIST_ID   = os.environ.get('WK_PASS_GIST_ID', '').strip()
          GIST_FILE = 'wk_pass_pending.json'

          if not all([WK_KEY, GH_TOKEN, GIST_ID]):
              print("ERROR: Missing secrets."); sys.exit(1)

          def gh_request(method, url, body=None):
              req = urllib.request.Request(
                  url, data=json.dumps(body).encode() if body else None,
                  headers={
                      'Authorization': f'token {GH_TOKEN}',
                      'Content-Type':  'application/json',
                      'Accept':        'application/vnd.github.v3+json',
                  },
                  method=method,
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                  return json.loads(r.read()), r.status

          def wk_post_review(entry):
              body = json.dumps({
                  'review': {
                      'assignment_id':             entry['assignmentId'],
                      'incorrect_meaning_answers': entry['incorrectMeaning'],
                      'incorrect_reading_answers': entry['incorrectReading'],
                  }
              }).encode()
              req = urllib.request.Request(
                  'https://api.wanikani.com/v2/reviews',
                  data=body,
                  headers={
                      'Authorization':     f'Bearer {WK_KEY}',
                      'Content-Type':      'application/json',
                      'Wanikani-Revision': '20170710',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return r.status in (200, 201), r.status, r.read().decode()[:200]
              except urllib.error.HTTPError as e:
                  return False, e.code, e.read().decode()[:200]

          print(f"Reading Gist {GIST_ID}...")
          try:
              gist, _ = gh_request('GET', f'https://api.github.com/gists/{GIST_ID}')
          except Exception as e:
              print(f"ERROR reading Gist: {e}"); sys.exit(1)

          content = gist.get('files', {}).get(GIST_FILE, {}).get('content', '[]')
          try:
              pending = json.loads(content or '[]')
          except Exception:
              print("ERROR: Could not parse Gist content as JSON"); sys.exit(1)

          if not pending:
              print("No pending reviews."); sys.exit(0)

          print(f"Found {len(pending)} pending review(s).")

          now = datetime.now(timezone.utc)
          due = []
          for p in pending:
              try:
                  avail_at = datetime.fromisoformat(p['availableAt'].replace('Z', '+00:00'))
                  if avail_at <= now:
                      due.append(p)
                  else:
                      delta = avail_at - now
                      mins  = int(delta.total_seconds() / 60)
                      print(f"  Waiting: {p['characters']} in {mins}m")
              except Exception as e:
                  print(f"  Skipping {p.get('characters','?')}: {e}")

          if not due:
              print("No reviews due yet."); sys.exit(0)

          print(f"Submitting {len(due)} due review(s)...")

          submitted_ids = set()
          for entry in due:
              if not entry.get('assignmentId'):
                  print(f"  SKIP {entry['characters']} - no assignmentId")
                  continue
              ok, status, body = wk_post_review(entry)
              if ok:
                  submitted_ids.add(entry['subjectId'])
                  print(f"  OK {entry['characters']} (assignment {entry['assignmentId']}) -> {status}")
              else:
                  print(f"  FAIL {entry['characters']} -> {status}: {body}")

          if not submitted_ids:
              print("No reviews submitted."); sys.exit(0)

          remaining = [p for p in pending if p['subjectId'] not in submitted_ids]
          print(f"Updating Gist: {len(submitted_ids)} submitted, {len(remaining)} remaining...")
          try:
              gh_request('PATCH', f'https://api.github.com/gists/{GIST_ID}', {
                  'files': { GIST_FILE: { 'content': json.dumps(remaining, indent=2) } }
              })
              print("Gist updated.")
          except Exception as e:
              print(f"WARNING: Gist update failed (reviews were submitted): {e}")

          print(f"Done. Submitted: {', '.join(p['characters'] for p in due if p['subjectId'] in submitted_ids)}")
          PYEOF
