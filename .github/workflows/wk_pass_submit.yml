name: WaniKani - Auto-submit Pass Hour reviews

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Submit due reviews from Gist
        env:
          GIST_TOKEN: ${{ secrets.WK_GIST_TOKEN }}
          WK_API_KEY: ${{ secrets.WK_API_KEY }}
          GIST_ID:    7a1082751cca1b6d2396d623ff9124b2
          GIST_FILE:  wk_pass_pending.json
        run: |
          python3 << 'PYEOF'
          import json, os, sys, urllib.request, urllib.error
          from datetime import datetime, timezone

          GIST_TOKEN = os.environ.get('GIST_TOKEN', '')
          WK_API_KEY = os.environ.get('WK_API_KEY', '') or 'ec933133-6d49-496b-b601-0f35ef40de73'
          GIST_ID    = os.environ['GIST_ID']
          GIST_FILE  = os.environ['GIST_FILE']

          if not GIST_TOKEN:
              print('ERROR: GIST_TOKEN (WK_GIST_TOKEN secret) not set')
              sys.exit(1)

          print(f'WK_API_KEY: {"from secret" if os.environ.get("WK_API_KEY") else "using built-in fallback"}')

          def parse_iso(s):
              return datetime.fromisoformat(s.replace('Z', '+00:00')).timestamp()

          def gist_get():
              req = urllib.request.Request(
                  f'https://api.github.com/gists/{GIST_ID}',
                  headers={
                      'Authorization': f'token {GIST_TOKEN}',
                      'Accept': 'application/vnd.github.v3+json',
                      'User-Agent': 'wk-pass-action',
                  }
              )
              with urllib.request.urlopen(req, timeout=15) as res:
                  return json.loads(res.read().decode())

          def gist_patch(pending):
              body = json.dumps({
                  'files': {GIST_FILE: {'content': json.dumps(pending, indent=2)}}
              }).encode()
              req = urllib.request.Request(
                  f'https://api.github.com/gists/{GIST_ID}',
                  data=body, method='PATCH',
                  headers={
                      'Authorization': f'token {GIST_TOKEN}',
                      'Content-Type': 'application/json',
                      'Accept': 'application/vnd.github.v3+json',
                      'User-Agent': 'wk-pass-action',
                  }
              )
              with urllib.request.urlopen(req, timeout=15) as res:
                  return res.status

          def wk_submit(entry):
              body = json.dumps({
                  'review': {
                      'assignment_id':             entry['assignmentId'],
                      'incorrect_meaning_answers': entry['incorrectMeaning'],
                      'incorrect_reading_answers': entry['incorrectReading'],
                  }
              }).encode()
              req = urllib.request.Request(
                  'https://api.wanikani.com/v2/reviews',
                  data=body, method='POST',
                  headers={
                      'Authorization':     f'Bearer {WK_API_KEY}',
                      'Content-Type':      'application/json',
                      'Wanikani-Revision': '20170710',
                  }
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as res:
                      print(f'    WK {res.status}: {res.read().decode()[:200]}')
                      return res.status in (200, 201)
              except urllib.error.HTTPError as e:
                  body_txt = e.read().decode()[:300]
                  print(f'    WK HTTP {e.code}: {body_txt}')
                  # 422 = already reviewed or assignment no longer available
                  if e.code == 422:
                      return 'already_done'
                  return False
              except Exception as ex:
                  print(f'    WK error: {ex}')
                  return False

          print('Reading Gist...')
          try:
              gist    = gist_get()
              raw     = gist.get('files', {}).get(GIST_FILE, {}).get('content', '[]')
              pending = json.loads(raw)
          except Exception as e:
              print(f'ERROR reading Gist: {e}')
              sys.exit(1)

          if not pending:
              print('Gist is empty - nothing to do.')
              sys.exit(0)

          now = datetime.now(timezone.utc).timestamp()
          due = [p for p in pending if parse_iso(p['availableAt']) <= now]
          print(f'Pending: {len(pending)}  |  Due now: {len(due)}')

          if not due:
              nxt  = min(pending, key=lambda p: p['availableAt'])
              mins = max(0, round((parse_iso(nxt['availableAt']) - now) / 60))
              print(f"Next due: {nxt['characters']} in ~{mins} min")
              sys.exit(0)

          submitted    = set()
          failed       = set()
          already_done = set()

          for entry in due:
              chars = entry.get('characters', '?')
              asgn  = entry.get('assignmentId')
              if not asgn:
                  print(f'  SKIP {chars} - missing assignmentId')
                  already_done.add(entry['subjectId'])
                  continue
              print(f'  Submitting {chars} (assignment {asgn})...')
              result = wk_submit(entry)
              if result == 'already_done':
                  already_done.add(entry['subjectId'])
                  print(f'  (already reviewed) {chars}')
              elif result:
                  submitted.add(entry['subjectId'])
                  print(f'  OK {chars}')
              else:
                  failed.add(entry['subjectId'])
                  print(f'  FAIL {chars} - will retry next run')

          done_ids = submitted | already_done
          if done_ids:
              remaining = [p for p in pending if p['subjectId'] not in done_ids]
              gist_patch(remaining)
              print(f'Done: {len(submitted)} submitted | {len(already_done)} already-done cleaned | {len(failed)} failed | {len(remaining)} remaining')
          else:
              print(f'Nothing submitted this run - {len(failed)} failed, will retry.')

          if failed and not submitted and not already_done:
              sys.exit(1)
          PYEOF
